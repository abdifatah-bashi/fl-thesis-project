site_name: FL Framework
site_url: https://abdifatah.github.io/fl-thesis-project
site_author: Abdifatah
site_description: Privacy-preserving heart disease prediction with Federated Learning

repo_name: fl-thesis-project
repo_url: https://github.com/abdifatah/fl-thesis-project

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/heart-pulse
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - header.autohide

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search:
      separator: '[\s\-\.]+'
  - glightbox

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - abbr
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - concepts/index.md
      - How FL Works: concepts/architecture.md
      - FedAvg Algorithm: concepts/federated-averaging.md
      - Privacy & Security: concepts/privacy.md
  - Guides:
      - guides/index.md
      - The Server: guides/server.md
      - The Client: guides/client.md
      - Data Pipeline: guides/data-pipeline.md
      - Running a Simulation: guides/simulation.md
  - API Reference:
      - api/index.md
      - HeartDiseaseNet: api/model.md
      - HeartDiseaseClient: api/client.md
      - Server: api/server.md
      - Data Loader: api/data-loader.md
      - Utilities: api/utils.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abdifatah/fl-thesis-project
  generator: false
